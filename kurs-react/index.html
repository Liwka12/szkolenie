<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoutbox Mono Light</title>
    
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <main class="container">
        <section id="sekcja-logowania" class="panel">
            <h1>SHOUTBOX_</h1>
            <div class="login-form">
                <input type="text" id="input-nick" placeholder="WPISZ NICK...">
                <button id="btn-wejdz">DOŁĄCZ</button>
            </div>
        </section>

        <section id="sekcja-czatu" class="panel hidden">
            <header class="chat-header">
                <h2 id="powitanie">UŻYTKOWNIK_</h2>
                <button id="btn-wyloguj">WYJDŹ</button>
            </header>
            
            <div id="okno-wiadomosci"></div>

            <form id="formularz-wiadomosci" class="chat-controls">
                <input type="text" id="input-wiadomosc" placeholder="WIADOMOŚĆ..." autocomplete="off">
                <button type="submit" id="btn-wyslij">WYŚLIJ</button>
            </form>
        </section>
    </main>

    <script src="./js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ Service Worker zarejestrowany!'))
                    .catch(err => console.log('❌ Błąd rejestracji SW:', err));
            });
        }
    </script>
</body>
</html>
